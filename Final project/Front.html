<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavorScync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E67E22',
                        secondary: '#F39C12',
                        darkOrange: '#D35400',
                        lightOrange: '#FFF3E0',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scroll-smooth {
                scroll-behavior: smooth;
            }
        }
    </style>

</head>
<body class="bg-lightOrange font-sans scroll-smooth"w-full h-screen>
<section class="bg-secondary/20 py-16 px-6">
        <div class="container mx-auto text-center">
            <h1 class="text-[clamp(1.5rem,4vw,2.5rem)] font-bold text-darkOrange mb-4">Savor Sync</h1>
            <img src="burger123.png" alt="Tasty Burger" class=" max-w-2xl mx-auto rounded-lg shadow-lg mb-6 w-[160px] h-[160px] object-cover">
            <p class="text-lg max-w-2xl mx-auto font-bold text-darkOrange mb-4">Go Get Your Food Here!</p>
            <a href="Log-in.html" class="inline-block mt-100 bg-primary hover:bg-darkOrange text-white font-semibold py-4 px-8 rounded-lg transition-all transform hover:scale-130">
                Get Started
            </a>
        </div>
    </section>


</body>
    
   
</html>
