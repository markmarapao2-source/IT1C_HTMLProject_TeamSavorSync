<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavorScync - Account & Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E67E22',
                        secondary: '#F39C12',
                        darkOrange: '#D35400',
                        lightOrange: '#FFF3E0',
                        brown: '#8B4513',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scroll-smooth {
                scroll-behavior: smooth;
            }
        }
    </style>
</head>
<body class="bg-lightOrange font-sans scroll-smooth flex items-center justify-center min-h-screen">

    <!-- Main Container -->
    <div class="w-full max-w-md p-6">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="w-[80px] h-[80px] rounded-full bg-brown flex items-center justify-center">
                <i class="fa fa-burger text-white text-4xl"></i>
            </div>
        </div>
        <h2 class="text-center text-[clamp(1.5rem,3vw,2rem)] font-bold text-darkOrange mb-8">SavorScync</h2>

        <!-- Toggle Buttons -->
        <div class="flex mb-6 bg-white rounded-lg p-1 shadow-md">
            <button id="loginTab" class="w-1/2 py-2 text-center font-semibold rounded-md bg-primary text-white transition">Login</button>
            <button id="registerTab" class="w-1/2 py-2 text-center font-semibold rounded-md text-gray-700 hover:bg-secondary/20 transition">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="bg-white p-8 rounded-xl shadow-lg">
            <h3 class="text-xl font-bold text-center text-darkOrange mb-6">Login to Your Account</h3>
            
            <div class="mb-4">
                <label class="block text-darkOrange font-semibold mb-2">Email</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <div class="mb-6">
                <label class="block text-darkOrange font-semibold mb-2">Password</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <button onclick="loginUser()" class="w-full bg-primary hover:bg-darkOrange text-white font-semibold py-3 rounded-lg transition-colors">
                Login
            </button>

            <p id="loginMsg" class="text-center text-sm mt-4 text-red-600 hidden"></p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="bg-white p-8 rounded-xl shadow-lg hidden">
            <h3 class="text-xl font-bold text-center text-darkOrange mb-6">Create New Account</h3>
            
            <div class="mb-4">
                <label class="block text-darkOrange font-semibold mb-2">Full Name</label>
                <input type="text" id="regName" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <div class="mb-4">
                <label class="block text-darkOrange font-semibold mb-2">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <div class="mb-4">
                <label class="block text-darkOrange font-semibold mb-2">Password</label>
                <input type="password" id="regPassword" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <div class="mb-6">
                <label class="block text-darkOrange font-semibold mb-2">Confirm Password</label>
                <input type="password" id="regConfirmPassword" class="w-full px-4 py-2 border-2 border-secondary/50 rounded-lg focus:border-primary outline-none transition-colors" required>
            </div>

            <button onclick="registerUser()" class="w-full bg-primary hover:bg-darkOrange text-white font-semibold py-3 rounded-lg transition-colors">
                Create Account
            </button>

            <p id="regMsg" class="text-center text-sm mt-4 text-red-600 hidden"></p>
        </div>

        <!-- Success Message -->
        <div id="successMsg" class="hidden mt-8 bg-green-100 border-2 border-green-500 rounded-xl p-6 text-center">
            <i class="fa fa-check-circle text-green-600 text-4xl mb-3"></i>
            <h3 class="text-lg font-bold text-green-800 mb-2">Success!</h3>
            <p id="successText" class="text-green-700"></p>
            <button onclick="goToLogin()" class="mt-4 bg-primary hover:bg-darkOrange text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                Go to Login
            </button>
        </div>

    </div>

    <script>
        // Toggle between forms
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');
        const loginMsg = document.getElementById('loginMsg');
        const regMsg = document.getElementById('regMsg');

        loginTab.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            loginTab.classList.add('bg-primary', 'text-white');
            loginTab.classList.remove('text-gray-700', 'hover:bg-secondary/20');
            registerTab.classList.remove('bg-primary', 'text-white');
            registerTab.classList.add('text-gray-700', 'hover:bg-secondary/20');
            successMsg.classList.add('hidden');
        });

        registerTab.addEventListener('click', () => {
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            registerTab.classList.add('bg-primary', 'text-white');
            registerTab.classList.remove('text-gray-700', 'hover:bg-secondary/20');
            loginTab.classList.remove('bg-primary', 'text-white');
            loginTab.classList.add('text-gray-700', 'hover:bg-secondary/20');
            successMsg.classList.add('hidden');
        });

        // Save user data to localStorage
        function registerUser() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            regMsg.classList.add('hidden');

            if (!name || !email || !password || !confirmPassword) {
                regMsg.textContent = "Please fill in all fields.";
                regMsg.classList.remove('hidden');
                return;
            }

            if (password !== confirmPassword) {
                regMsg.textContent = "Passwords do not match.";
                regMsg.classList.remove('hidden');
                return;
            }

            // Check if email already exists
            let users = JSON.parse(localStorage.getItem('savorscync_users')) || [];
            const emailExists = users.some(user => user.email === email);

            if (emailExists) {
                regMsg.textContent = "An account with this email already exists.";
                regMsg.classList.remove('hidden');
                return;
            }

            // Save new user
            users.push({ name, email, password });
            localStorage.setItem('savorscync_users', JSON.stringify(users));

            // Show success
            successText.textContent = "Your account has been created successfully!";
            successMsg.classList.remove('hidden');
            registerForm.classList.add('hidden');
        }

        // Login function
        function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            loginMsg.classList.add('hidden');

            if (!email || !password) {
                loginMsg.textContent = "Please fill in all fields.";
                loginMsg.classList.remove('hidden');
                return;
            }

            // Get users from storage
            let users = JSON.parse(localStorage.getItem('savorscync_users')) || [];
            const validUser = users.find(user => user.email === email && user.password === password);

            if (validUser) {
                successText.textContent = `Welcome back, ${validUser.name}! You are now logged in.`;
                successMsg.classList.remove('hidden');
                loginForm.classList.add('hidden');
            } else {
                loginMsg.textContent = "Invalid email or password.";
                loginMsg.classList.remove('hidden');
            }
        }

        // Go to login after register
        function goToLogin() {
            loginTab.click();
        }
    </script>

</body>
</html>
